name: 'Babysteps Ratchet Evaluation'
description: 'Evaluates your quality goals'
inputs:
  BABYSTEPS_PYTEST_COVERAGE:
    description: "Current live performance value for 'Pytest Coverage'"
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Run BabySteps Guardrail Validation
      shell: bash
      run: uvx babysteps-ratchet check
      env:
        BABYSTEPS_PYTEST_COVERAGE: ${{ inputs.BABYSTEPS_PYTEST_COVERAGE }}
